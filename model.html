<!DOCTYPE html>

<body>
    <!DOCTYPE html>
<html>
<head>
<title>CSS Box Model Large Example</title>

<style>

body{
    font-family: Arial, sans-serif;
    background-color: #f4f4f4;
}

.container{
    width: 900px;
    margin: auto;
}

h1{
    text-align: center;
}

.box{
    width: 250px;
    height: 120px;
    padding: 20px;
    border: 4px solid black;
    margin: 25px;
    background-color: lightblue;
    border-radius: 15px;
    box-shadow: 5px 5px 10px gray;
    text-align: center;
    float: left;
}

.box1{
    background-color: lightblue;
}

.box2{
    background-color: lightgreen;
}

.box3{
    background-color: lightcoral;
}

.box4{
    background-color: lightyellow;
}

.box5{
    background-color: lightpink;
}

.box6{
    background-color: lavender;
}

.box:hover{
    background-color: orange;
    transform: scale(1.05);
}

</style>
</head>

<body>

<div class="container">

<h1>CSS Box Model Demonstration</h1>

<div class="box box1">
Content Area Example
</div>

<div class="box box2">
Padding Inside Box
</div>

<div class="box box3">
Border Around Box
</div>

<div class="box box4">
Margin Outside Box
</div>

<div class="box box5">
Rounded Corners
</div>

<div class="box box6">
Shadow & Hover Effect
</div>

</div>

</body>
</html>
</body>
</html>
