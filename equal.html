    <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Equal Spacing</title>
<style>
  .container {
    display: flex;
    justify-content: space-between;
    padding: 20px;
    background-color: #ecf0f1;
  }
  .box {
    width: 80px;
    height: 80px;
    background-color: #9b59b6;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: bold;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="box">1</div>
    <div class="box">2</div>
    <div class="box">3</div>
    <div class="box">4</div>
  </div>
</body>
</html>
</body>
</html>
