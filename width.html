    <!DOCTYPE html>
<html>
<head>
<title>Full Width Item</title>

<style>

.container{
display:flex;
}

.box{
width:100px;
height:100px;
background:blue;
margin:10px;
}

.grow{
flex-grow:1;
background:orange;
}

</style>

</head>

<body>

<div class="container">
<div class="box"></div>
<div class="box grow"></div>
<div class="box"></div>
</div>

</body>
</html>
</body>
</html>
