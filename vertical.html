    <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Vertical Stack</title>
<style>
  .container {
    display: flex;
    flex-direction: column;
    gap: 15px;
    height: 100vh;
    justify-content: center;
    align-items: center;
  }
  .box {
    width: 120px;
    height: 80px;
    background-color: #2ecc71;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: bold;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="box">Box A</div>
    <div class="box">Box B</div>
    <div class="box">Box C</div>
  </div>
</body>
</html>
</body>
